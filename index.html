<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BS KM Clan Dashboard Live</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-grid"></div>

    <section class="global-stats-container">
        <div class="power-display">
            <div class="power-label">Total Trophées</div>
            <div class="power-value">
                <span id="global-trophies">0</span>
                <span class="trophy-icon">🏆</span>
            </div>
            <div class="power-bar-bg"><div id="global-bar" class="power-bar-fill"></div></div>
        </div>
    </section>

    <section class="global-leaderboard">
        <div class="leaderboard-card">
            <div class="ticker-container">
                <div id="full-leaderboard" class="ticker-wrapper"></div>
            </div>
        </div>
    </section>

    <main class="container">
        <div class="clan-wrapper">
            <div class="clan-column">
                <h2 class="clan-title km1-neon">KM1</h2>
                <div class="clan-stats" id="stats-km1"></div>
                <div class="progress-container"><div class="progress-bar km1-bar" id="bar-km1"></div></div>
                <div class="player-list" id="list-km1"></div>
            </div>

            <div class="clan-column">
                <h2 class="clan-title km2-neon">KM2</h2>
                <div class="clan-stats" id="stats-km2"></div>
                <div class="progress-container"><div class="progress-bar km2-bar" id="bar-km2"></div></div>
                <div class="player-list" id="list-km2"></div>
            </div>

            <div class="clan-column">
                <h2 class="clan-title km3-neon">KM3</h2>
                <div class="clan-stats" id="stats-km3"></div>
                <div class="progress-container"><div class="progress-bar km3-bar" id="bar-km3"></div></div>
                <div class="player-list" id="list-km3"></div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
